name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Prevent multiple deployments at once
concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      # Keep deployment target aligned with preview-gate fallback behavior.
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'akyodex' }}
    
    permissions:
      contents: read
      deployments: write
      
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deployment.outputs.url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.ts', 'open-next.config.ts') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.ts', 'open-next.config.ts') }}-
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build for Cloudflare Pages
        run: npm run build
        env:
          # Environment variables should be configured in Cloudflare Pages dashboard
          # These are fallback values for build process only
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH || vars.DEFAULT_ADMIN_PASSWORD_HASH }}
          OWNER_PASSWORD_HASH: ${{ secrets.OWNER_PASSWORD_HASH || vars.DEFAULT_OWNER_PASSWORD_HASH }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || vars.DEFAULT_JWT_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_R2_BASE: ${{ vars.NEXT_PUBLIC_R2_BASE }}
          
      - name: Verify build output
        run: |
          echo "Verifying build output..."
          if [ ! -d ".open-next" ]; then
            echo "Error: .open-next directory not found"
            exit 1
          fi
          
          echo "Build output contents:"
          ls -la .open-next/
          
          echo ""
          echo "Build output size:"
          du -sh .open-next/
          
          echo ""
          echo "Verifying critical files..."
          test -f .open-next/_worker.js && echo "✅ Worker script present" || (echo "❌ Worker script missing" && exit 1)
          test -f .open-next/_routes.json && echo "✅ Routes config present" || (echo "❌ Routes config missing" && exit 1)
          test -d .open-next/_next && echo "✅ Next.js assets present" || (echo "❌ Next.js assets missing" && exit 1)
          
          echo ""
          echo "✅ All critical files verified successfully"
          
      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next --project-name=${{ env.CF_PAGES_PROJECT }}

      - name: Verify deployment health
        id: health_check
        if: steps.deployment.outcome == 'success'
        run: |
          echo "Checking deployment health..."
          DEPLOY_URL="${{ steps.deployment.outputs.url }}"
          if [ -n "$DEPLOY_URL" ]; then
            echo "Testing deployment at: $DEPLOY_URL"
            max_attempts=10
            interval_seconds=3
            for attempt in $(seq 1 "${max_attempts}"); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
                echo "status=healthy" >> "$GITHUB_OUTPUT"
                echo "✅ Deployment is responding (HTTP $HTTP_CODE) on attempt ${attempt}/${max_attempts}"
                exit 0
              fi

              if [ "${attempt}" -lt "${max_attempts}" ]; then
                echo "Deployment returned HTTP $HTTP_CODE on attempt ${attempt}/${max_attempts}; retrying in ${interval_seconds}s..."
                sleep "${interval_seconds}"
              fi
            done

            echo "status=unhealthy" >> "$GITHUB_OUTPUT"
            echo "⚠️  Deployment did not return a healthy HTTP status after ${max_attempts} attempts"
            exit 1
          else
            echo "status=missing_url" >> "$GITHUB_OUTPUT"
            echo "⚠️  Deployment URL not available for health check; skipping HTTP verification"
            exit 0
          fi
          
      - name: Create deployment summary
        if: always()
        run: |
          DEPLOY_OUTCOME="${{ steps.deployment.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          HEALTH_STATUS="${{ steps.health_check.outputs.status }}"
          DEPLOY_URL="${{ steps.deployment.outputs.url }}"
          HEALTH_LABEL="${HEALTH_STATUS:-${HEALTH_OUTCOME:-skipped}}"

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ Deployment successful and healthy!" >> $GITHUB_STEP_SUMMARY
          elif [ "$DEPLOY_OUTCOME" = "success" ] && [ "$HEALTH_STATUS" = "missing_url" ]; then
            echo "⚠️  Deployment completed, but the action did not expose a URL for HTTP health verification." >> $GITHUB_STEP_SUMMARY
          elif [ "$DEPLOY_OUTCOME" = "success" ]; then
            echo "⚠️  Deployment completed, but health verification did not pass." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Step**: ${DEPLOY_OUTCOME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check**: ${HEALTH_LABEL}" >> $GITHUB_STEP_SUMMARY
          if [ -n "$DEPLOY_URL" ]; then
            echo "- **URL**: ${DEPLOY_URL}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Build Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          
      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Deployment Preview\n\nYour changes have been deployed to Cloudflare Pages!\n\n**Environment**: ${context.payload.inputs?.environment || 'production'}\n**URL**: ${process.env.DEPLOYMENT_URL}\n\n✅ Build completed successfully.`
            })
